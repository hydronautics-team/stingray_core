name: Build and Push Docker Image

# Триггер на пуш из любой ветки
on:
  push: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          file: docker/Dockerfile
          push: true
          # Можно тегировать образ по имени ветки, чтобы отличать сборки
          tags: hydronautics/stingray_core:latest
          platforms: linux/amd64,linux/arm64
          # Передаём имя ветки в Dockerfile как build-arg
          build-args: |
            STINGRAY_CORE_BRANCH=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
