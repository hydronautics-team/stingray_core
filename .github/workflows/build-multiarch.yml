name: Build and Push Docker Image

on:
  push:
    branches:
      - master
      - test/**

env:
  DOCKER_HUB_REPO: hydronautics/stingray_core

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image with commit hash tag
        run: docker build -f docker/Dockerfile -t ${{ env.DOCKER_HUB_REPO }}:${{ github.sha }} .

      - name: Add branch tag for test branches
        if: startsWith(github.ref_name, 'test/')
        run: |
          BRANCH_TAG=${GITHUB_REF_NAME#test/}   # убираем 'test/' из имени ветки
          docker tag ${{ env.DOCKER_HUB_REPO }}:${{ github.sha }} ${{ env.DOCKER_HUB_REPO }}:$BRANCH_TAG

      - name: Build ROS packages inside container
        run: |
          docker run --rm \
            -v "$(pwd)":/stingray_core \
            ${{ env.DOCKER_HUB_REPO }}:${{ github.sha }} \
            bash -c "cd /stingray_core && colcon build --packages-select \
              dvl_msgs \
              stingray_core_control \
              stingray_core_communication \
              serial_driver \
              io_context \
              asio_cmake_module \
              vectornav_msgs \
              vectornav \
              stingray_core_launch \
              pressure_sensor"
          
      
      - name: Push commit hash tag
        run: docker push ${{ env.DOCKER_HUB_REPO }}:${{ github.sha }}

      - name: Push branch tag (for test branches)
        if: startsWith(github.ref_name, 'test/')
        run: |
          BRANCH_TAG=${GITHUB_REF_NAME#test/}
          docker push ${{ env.DOCKER_HUB_REPO }}:$BRANCH_TAG
